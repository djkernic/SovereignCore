# General Setup
application: vm-service-broker
applicationShortName: vm
version: 0.1.0
bySquadLabel: vmaas
forProductLabel: all
namespace: vm-service-broker
productName: 'VM Service Tech Preview'
port: 7331
name: vm-service-tech-preview

replicas: 1

# Container image to use
image: /automation-saas-platform/vm-service-broker:main-1776704570

# mTLS is highly recommended for security
mtls:
  enabled: false

# Cluster Configs
cluster: 
  id: unknown
  type: unknown
  appdomain: account-iam.apps.example.com
  issuer: sovcloud-issuer
  issuerKind: ClusterIssuer
  server: unknown

# Container Registry
registry: 
  domain: unknown
  chartsRepo: unknown
  chartsBasePath: 'automation-saas-platform-dev/main/'
  chartsVersion: '0.1.0'
  imagesRepo: registry-quay-quay-enterprise.apps.example.com/sovcloud

# IAM auth configuration
authConfig:
  enabled: true
  serviceBrokerSecretName: service-broker-secret

sharedCluster:
  url: https://console-openshift-console.apps.example.com
  vmImageRepo: registry-quay-quay-enterprise.apps.example.com/sovcloud
  vmSampleImage: /automation-saas-platform/containerdisks/fedora:43-1.6

# Made with Bob
