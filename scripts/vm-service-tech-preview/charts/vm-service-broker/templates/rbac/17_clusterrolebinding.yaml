apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: '{{ .Values.application }}-cluster-role-binding'
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  labels:
    app: '{{ .Values.application }}'
    by-squad: '{{ .Values.bySquadLabel }}'
    for-product: '{{ .Values.forProductLabel }}'
subjects:
  - kind: ServiceAccount
    name: '{{ .Values.application }}-service-account'
    namespace: '{{ .Values.namespace }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ .Values.application }}-cluster-role'
