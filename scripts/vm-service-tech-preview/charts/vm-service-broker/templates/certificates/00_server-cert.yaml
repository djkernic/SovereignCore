apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: '{{ .Values.application }}-server-cert'
  namespace: {{.Values.namespace}}
  annotations:
    argocd.argoproj.io/sync-wave: "00"
  labels:
    essential: "true"
    bcdr-candidate: "t"
    component-name: {{ .Values.application }}
    by-squad: {{ .Values.bySquadLabel }}
    for-product: {{ .Values.forProductLabel }}
spec:
  secretName: '{{ .Values.application }}-server-cert-secret'
  secretTemplate:
    labels:
      bcdr-candidate: "t"
  dnsNames:
    - '{{ .Values.applicationShortName }}-service.{{ .Values.namespace }}'
    - '{{ .Values.applicationShortName }}-service.{{ .Values.namespace }}.svc'
    - '{{ .Values.applicationShortName }}-service.{{ .Values.namespace }}.svc.cluster'
    - '{{ .Values.applicationShortName }}-service.{{ .Values.namespace }}.svc.cluster.local'
  issuerRef:
    name: {{ .Values.cluster.issuer }}
    kind: ClusterIssuer